name: Agent Review

on:
  pull_request:
    types: [opened, synchronize, reopened, labeled]

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  review:
    if: |
      contains(github.event.pull_request.labels.*.name, 'ai-generated') ||
      github.event.pull_request.user.login == 'github-actions[bot]' ||
      (github.event.action == 'labeled' && github.event.label.name == 'ai-review')
    runs-on: [self-hosted, panassetlite-agent]
    env:
      PR_NUMBER: ${{ github.event.pull_request.number }}
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Checkout PR head
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build check
        run: |
          set -euo pipefail
          npm run lint
          npm run build

      - name: Run reviewer agent
        run: |
          set -euo pipefail

          test -f "$HOME/.codex/auth.json" || {
            echo "::error::~/.codex/auth.json missing on self-hosted runner host."
            exit 3
          }

          gh pr diff "$PR_NUMBER" > /tmp/diff.patch

          {
            cat .github/agent-review-instructions.md
            printf '\n\n## Diff under review\n\n```diff\n'
            cat /tmp/diff.patch
            printf '\n```\n'
          } > /tmp/review-prompt.md

          codex exec --sandbox read-only \
            --output-last-message /tmp/review.md \
            < /tmp/review-prompt.md

          if [ ! -s /tmp/review.md ]; then
            echo "::error::codex produced no review output (interrupted or failed)."
            exit 4
          fi

          verdict=$(awk '/^## Verdict/{flag=1; next} flag && NF{print; exit}' /tmp/review.md | tr -d ' `')

          case "$verdict" in
            approve)         flag="--approve" ;;
            request-changes) flag="--request-changes" ;;
            *)               flag="--comment" ;;
          esac

          gh pr review "$PR_NUMBER" $flag -F /tmp/review.md || \
            gh pr comment "$PR_NUMBER" -F /tmp/review.md
