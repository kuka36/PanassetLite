name: Deploy GitHub Pages

# Release-based deploy: only version tags (v1.2.3) go live, never plain pushes
# to main. workflow_dispatch is kept as a manual escape hatch (re-deploy/rollback).
on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    # Only the repo owner can ship a release: guards both the v* tag push and the
    # manual workflow_dispatch. A tag pushed by anyone else is skipped, not deployed.
    if: github.actor == github.repository_owner
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      # Self-gate: a tag may point at any commit, so re-verify quality here
      # instead of trusting that CI ran on this exact ref.
      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npx tsc -b --noEmit

      - name: Build
        env:
          # GitHub Pages project site: https://<owner>.github.io/<repo>/
          VITE_BASE: /${{ github.event.repository.name }}/
        run: npm run build

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
