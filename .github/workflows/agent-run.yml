name: Agent Run

on:
  issues:
    types: [labeled]

# 同一 Issue 重复触发时取消旧 run，避免 ai/{n}-* 分支互相 force-push 踩踏
concurrency:
  group: agent-issue-${{ github.event.issue.number }}
  cancel-in-progress: true

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  run-agent:
    # Only the repo owner may kick off an agent run: the 'ai-task' label must be
    # applied by the owner themselves, not by collaborators or outside contributors.
    if: github.event.label.name == 'ai-task' && github.actor == github.repository_owner
    # Runs on a self-hosted runner with Codex CLI and `codex login` auth (~/.codex/auth.json).
    runs-on: [self-hosted, panassetlite-agent]
    env:
      ISSUE_NUMBER: ${{ github.event.issue.number }}
      ISSUE_TITLE: ${{ github.event.issue.title }}
      ISSUE_BODY: ${{ github.event.issue.body }}
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Compute branch slug
        id: slug
        run: |
          slug=$(echo "$ISSUE_TITLE" | tr '[:upper:]' '[:lower:]' \
            | sed -E 's/[^a-z0-9]+/-/g; s/^-+|-+$//g' | cut -c1-40)
          [ -z "$slug" ] && slug="task"
          branch="ai/${ISSUE_NUMBER}-${slug}"
          echo "branch=$branch" >> "$GITHUB_OUTPUT"

      - name: Acknowledge on issue
        run: |
          gh issue comment "$ISSUE_NUMBER" --body \
            ":robot: Agent run started on branch \`${{ steps.slug.outputs.branch }}\` ([run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}))."

      - name: Prepare branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -B "${{ steps.slug.outputs.branch }}"

      - name: Run agent
        id: agent
        run: |
          set -euo pipefail

          test -f "$HOME/.codex/auth.json" || {
            echo "::error::~/.codex/auth.json missing — run 'codex login' on the self-hosted runner host."
            exit 3
          }

          printf '# Issue #%s: %s\n\n%s\n' "$ISSUE_NUMBER" "$ISSUE_TITLE" "$ISSUE_BODY" > /tmp/task.md
          { cat .github/agent-instructions.md; echo; cat /tmp/task.md; } > /tmp/prompt.md
          codex exec --sandbox workspace-write < /tmp/prompt.md

      - name: Lint
        id: lint
        run: npm run lint 2>&1 | tee /tmp/lint.log

      - name: Build
        id: build
        run: npm run build 2>&1 | tee /tmp/build.log

      - name: Gate paths
        id: gate
        run: |
          if [ -z "$(git status --porcelain)" ]; then
            echo "::error::Agent produced no changes."
            exit 2
          fi
          bash .agent/harness/gate-paths.sh

      - name: Commit
        id: commit
        run: |
          git add -A
          git commit \
            -m "feat: address issue #${ISSUE_NUMBER}" \
            -m "Closes #${ISSUE_NUMBER}" \
            -m "Co-Authored-By: Codex Agent <agent@panassetlite.local>"

      - name: Report failure
        if: failure()
        run: |
          body=":x: **Agent run failed** — [完整日志](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})"
          body+=$'\n\n'

          if [ "${{ steps.agent.conclusion }}" = "failure" ]; then
            body+=$'**失败阶段**: Codex 执行\n'
            body+=$'Codex 未正常完成，请查看 Actions 日志中的 Run agent 步骤。\n\n'
          fi
          if [ "${{ steps.lint.conclusion }}" = "failure" ]; then
            body+=$'**失败阶段**: lint\n\n'
            if [ -f /tmp/lint.log ]; then
              body+=$'```\n'
              body+=$(tail -n 40 /tmp/lint.log)
              body+=$'\n```\n\n'
            fi
          fi
          if [ "${{ steps.build.conclusion }}" = "failure" ]; then
            body+=$'**失败阶段**: build\n\n'
            if [ -f /tmp/build.log ]; then
              body+=$'```\n'
              body+=$(tail -n 40 /tmp/build.log)
              body+=$'\n```\n\n'
            fi
          fi
          if [ "${{ steps.gate.conclusion }}" = "failure" ]; then
            body+=$'**失败阶段**: 路径校验\n'
            body+=$'Agent 修改了禁止变更的路径（如 \`.github/workflows\`、\`.cursor/\`），或没有产生有效改动。\n\n'
          fi
          if [ "${{ steps.commit.conclusion }}" = "failure" ]; then
            body+=$'**失败阶段**: git commit\n'
            body+=$'提交失败（可能是 pre-commit hook、git 配置或索引问题）。\n\n'
          fi

          gh issue comment "$ISSUE_NUMBER" --body "$body"

      - name: Push branch
        if: success()
        run: git push --force origin "${{ steps.slug.outputs.branch }}"

      - name: Open or update PR
        if: success()
        env:
          BRANCH: ${{ steps.slug.outputs.branch }}
        run: |
          bash .agent/harness/generate-pr-body.sh "$ISSUE_NUMBER" "$ISSUE_TITLE" > /tmp/pr-body.md

          pr_num=$(gh pr list --head "$BRANCH" --state open --json number -q '.[0].number' || true)
          if [ -n "$pr_num" ]; then
            echo "Updating PR #$pr_num for $BRANCH"
            gh pr edit "$pr_num" --body-file /tmp/pr-body.md
          else
            gh pr create \
              --base main \
              --head "$BRANCH" \
              --title "${ISSUE_TITLE}" \
              --body-file /tmp/pr-body.md \
              --label ai-generated
          fi
